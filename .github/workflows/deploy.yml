name: Build and Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repo Name for Tagging
        id: string
        run: |
          echo "repo_lowercase=${GITHUB_REPOSITORY,,}" >> ${GITHUB_OUTPUT}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.string.outputs.repo_lowercase }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render Deploy
        run: |
          response=$(curl -s -w "%{http_code}" -o /dev/null -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          if [ "$response" -eq 200 ] || [ "$response" -eq 204 ] || [ "$response" -eq 201 ] || [ "$response" -eq 302 ]; then
            echo "Deployment triggered successfully (status $response)."
          elif [ "$response" -eq 409 ]; then
            echo "Warning: A deployment is already in progress on Render (status 409). Ignoring conflict."
          else
            echo "Error: Deployment failed with status code $response."
            exit 1
          fi