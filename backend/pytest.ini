[pytest]
# Default options to run during every test invocation
addopts = 
    --cov=app 
    --cov-report=term-missing 
    --cov-fail-under=80 
    --strict-markers 
    -v

# Directories to search for tests
testpaths = tests

# Asyncio plugin configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Ignore folders during test collection
norecursedirs = .git .venv .uv_cache .uv_python migrations
