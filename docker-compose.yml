version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: society_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: enterprise_secure_password
      POSTGRES_DB: society_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis_cache:
    image: redis:7-alpine
    container_name: society_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: